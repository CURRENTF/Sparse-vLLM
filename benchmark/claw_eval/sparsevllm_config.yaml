# Claw-Eval config template for a local Sparse-vLLM OpenAI-compatible server.
#
# The runner script writes a concrete copy into its run directory after setting
# SPARSEVLLM_OPENAI_BASE_URL, SPARSEVLLM_CLAW_MODEL_ID, and CLAW_EVAL_TRACE_DIR.
model:
  api_key: ${SPARSEVLLM_OPENAI_API_KEY}
  base_url: ${SPARSEVLLM_OPENAI_BASE_URL}
  model_id: ${SPARSEVLLM_CLAW_MODEL_ID}
  context_window: ${SPARSEVLLM_CONTEXT_WINDOW}

judge:
  api_key: ${OPENROUTER_API_KEY}
  base_url: ${CLAW_EVAL_JUDGE_BASE_URL}
  model_id: ${CLAW_EVAL_JUDGE_MODEL}
  enabled: true

defaults:
  trace_dir: ${CLAW_EVAL_TRACE_DIR}
  tasks_dir: tasks
